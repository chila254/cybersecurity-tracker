version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: incident-tracker-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ENVIRONMENT=production
      - CORS_ORIGINS=["http://localhost:3000", "http://frontend:3000"]
    depends_on:
      - db
    networks:
      - incident-tracker-network
    volumes:
      - ./backend:/app
    command: python main.py

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: incident-tracker-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    depends_on:
      - backend
    networks:
      - incident-tracker-network
    volumes:
      - ./:/app
      - /app/.next

  # If using local PostgreSQL (optional - use Supabase instead)
  db:
    image: postgres:15-alpine
    container_name: incident-tracker-db
    environment:
      - POSTGRES_USER=incident_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-incident_password}
      - POSTGRES_DB=incident_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    networks:
      - incident-tracker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  incident-tracker-network:
    driver: bridge

volumes:
  postgres_data:
